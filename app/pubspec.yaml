name: paperdrop
description: "PaperDrop - Chat with your PDFs, generate practice papers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.4.0
  go_router: ^14.0.0
  dio: ^5.4.0
  file_picker: ^8.0.0
  flutter_pdfview: ^1.3.2
  flutter_markdown: ^0.7.1
  uuid: ^4.3.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
